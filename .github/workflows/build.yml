name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA Project
        run: |
          mkdir twa-app && cd twa-app
          bubblewrap init --manifest https://tacticalvishnu-hue.github.io/Nightlens/manifest.json \
            --directory .
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd twa-app
          bubblewrap build
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: nightlens-apk
          path: twa-app/*.apk
